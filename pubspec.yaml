name: sleuth
description: "In-app performance diagnostics overlay for Flutter. Surfaces jank, memory leaks, slow networks, GPU pressure, and widget anti-patterns. Every issue ships with a fix hint."
version: 0.29.0
homepage: https://github.com/Harrys76/sleuth
repository: https://github.com/Harrys76/sleuth
issue_tracker: https://github.com/Harrys76/sleuth/issues
topics:
  - performance
  - debugging
  - developer-tools
  - profiling

platforms:
  android:
  ios:

# Uncomment after adding a screenshot image:
# screenshots:
#   - description: 'Sleuth overlay showing live FPS chart and detected performance issues'
#     path: doc/screenshots/overlay.png

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.15.0
  path: ^1.9.0
  vm_service: ^14.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  fake_async: any
  crypto: any
  # Bundle I (AGR-3 + R3-NEW-2): the shared audit-invariant helpers use
  # `package:analyzer` to parse reproducer test files at AST level, so a
  # string literal like `'uses XyzDetector'` or `'test("fake")'` can no
  # longer masquerade as a real token reference / real `test(...)` call.
  # Dev-only dependency — not re-exported via the public barrel.
  analyzer: ^6.0.0
