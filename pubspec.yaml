name: sleuth
description: "Runtime performance diagnostics for Flutter apps — frame timing, VM timeline, and widget-tree heuristics to surface bottlenecks and actionable fixes."
version: 0.14.1
homepage: https://github.com/Harrys76/sleuth
repository: https://github.com/Harrys76/sleuth
issue_tracker: https://github.com/Harrys76/sleuth/issues
topics:
  - performance
  - debugging
  - developer-tools
  - profiling

platforms:
  android:
  ios:

# Uncomment after adding a screenshot image:
# screenshots:
#   - description: 'Sleuth overlay showing live FPS chart and detected performance issues'
#     path: doc/screenshots/overlay.png

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  vm_service: ^14.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  fake_async: any
